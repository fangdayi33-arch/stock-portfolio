name: 港股打新每日更新

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-ipo-data:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./打新

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 运行抓取脚本
        run: python scrape_hkex_ipos.py

      - name: 提交更新
        run: |
          git config user.name "IPO Bot"
          git config user.email "ipo-bot@users.noreply.github.com"
          git add 打新/ipo_daily_report.json
          git diff --cached --quiet || git commit -m "每日港股打新数据更新 $(date +'%Y-%m-%d')"
          git push
