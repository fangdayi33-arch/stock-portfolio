<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股打新量化评分监控舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .glow-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glow-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.15); }
    </style>
</head>
<body class="h-full flex flex-col custom-scrollbar overflow-x-hidden">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-xl sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600/20 rounded-lg text-indigo-400 border border-indigo-500/30">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                        港股打新量化评分实盘监控舱
                        <span class="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded font-mono">实时</span>
                    </h1>
                    <p class="text-xs text-slate-400 mt-0.5">数据源：致富证券新股列表 + 腾讯行情</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <span class="text-[10px] uppercase tracking-wider text-slate-500 block">数据同步</span>
                    <span id="syncTime" class="text-xs font-mono font-medium text-emerald-400">-</span>
                </div>
                <button onclick="toggleSyncModal()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-xs font-semibold flex items-center gap-2 text-slate-200 transition-colors">
                    <i class="fa-solid fa-cloud-arrow-down text-indigo-400"></i> 数据源同步
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-8">

        <!-- 决策模块 -->
        <section class="mb-12">
            <div class="flex justify-between items-end border-b border-slate-800 pb-3 mb-6">
                <div>
                    <h2 class="text-lg font-bold text-white flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
                        招股中 / 拟上市新股
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">基于流通盘规模和 A+H 折价深度自动给出打新策略</p>
                </div>
                <div class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full text-xs font-semibold">
                    待决标的：<span id="activeCount" class="font-bold">0</span>
                </div>
            </div>
            <div id="activeIpoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- 历史参考区 -->
        <section>
            <div class="flex justify-between items-end border-b border-slate-800 pb-3 mb-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-300 flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-slate-500"></span>
                        近期已上市参考（无指导意见，仅复盘战绩）
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">数据来自港交所和腾讯行情，展示最新已上市新股实际表现</p>
                </div>
            </div>
            <div id="historyIpoTable" class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl"></div>
        </section>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950 px-6 py-4 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-xs text-slate-500">
            <p>港股打新量化评分监控舱</p>
            <p>免责声明：本模型分析建议仅供技术交流参考，不构成投资建议。</p>
        </div>
    </footer>

    <!-- 同步弹窗 -->
    <div id="syncModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-base font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-code text-indigo-400"></i> 同步数据源
                </h3>
                <button onclick="toggleSyncModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <p class="text-xs text-slate-400 mb-4 leading-relaxed">
                将 <code class="bg-slate-950 text-indigo-400 px-1 py-0.5 rounded">ipo_daily_report.json</code> 的内容粘贴到下方，点击导入。
            </p>
            <textarea id="jsonInput" placeholder="在此粘贴 JSON 数据..." class="w-full h-48 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono text-emerald-400 focus:outline-none focus:border-indigo-500 mb-4 custom-scrollbar"></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="toggleSyncModal()" class="px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs font-semibold rounded-lg transition-colors">取消</button>
                <button onclick="importJsonData()" class="px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-500 text-xs font-semibold rounded-lg transition-colors">解析并同步</button>
            </div>
        </div>
    </div>

    <script>
        let ipoData = [];

        // 评分视觉配置
        const RATING_UI = {
            '积极关注': { bg: 'bg-rose-500/10', text: 'text-rose-400', border: 'border-rose-500/20', icon: '🔥' },
            '可参与':   { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/20', icon: '👍' },
            '投机博弈':  { bg: 'bg-amber-500/10', text: 'text-amber-400', border: 'border-amber-500/20', icon: '🎲' },
            '观望':     { bg: 'bg-slate-500/10', text: 'text-slate-400', border: 'border-slate-500/20', icon: '👀' },
        };

        // ----- 渲染 -----

        function renderAll() {
            const items = Array.isArray(ipoData) ? ipoData.filter(d => !d._meta) : [];
            const meta = Array.isArray(ipoData) ? ipoData.find(d => d._meta) : null;

            if (meta && meta._meta && meta._meta.generatedAt) {
                document.getElementById('syncTime').innerText = meta._meta.generatedAt;
            }

            const active = items.filter(s => s.status === 'active');
            const listed = items.filter(s => s.status === 'listed');

            document.getElementById('activeCount').innerText = active.length;
            renderActiveCards(active);
            renderHistoryTable(listed);
        }

        function renderActiveCards(active) {
            const grid = document.getElementById('activeIpoGrid');
            if (active.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500">
                    <i class="fa-solid fa-cloud-arrow-down text-4xl mb-3"></i>
                    <p class="text-sm font-medium">暂无数据</p>
                    <p class="text-xs text-slate-600 mt-2">点右上角「数据源同步」导入 JSON，或启动本地服务器自动加载</p>
                </div>`;
                return;
            }
            grid.innerHTML = active.map(stock => {
                const score = stock.score || 0;
                const rating = stock.rating || '观望';
                const ui = RATING_UI[rating] || RATING_UI['观望'];

                const ahBadge = stock.isAH && stock.ahDiscount != null ? `
                    <div class="col-span-2 flex justify-between items-center bg-slate-950/50 border border-slate-800 rounded-lg p-2.5 text-xs">
                        <span class="text-slate-500"><i class="fa-solid fa-link text-indigo-400 mr-1"></i> A+H 联动折让</span>
                        <span class="font-mono font-bold ${stock.ahDiscount >= 20 ? 'text-rose-400' : 'text-slate-400'} px-2 py-0.5 rounded">H股折价 ${stock.ahDiscount}%</span>
                    </div>` : '';

                return `<div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6 glow-card flex flex-col justify-between h-full relative overflow-hidden group">
                    <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="text-lg font-bold text-white">${stock.name}</h3>
                                    <span class="text-[10px] font-mono font-semibold bg-indigo-500/10 text-indigo-400 px-2 py-0.5 border border-indigo-500/20 rounded">${stock.code}.HK</span>
                                </div>
                                <p class="text-xs text-slate-500 mt-1">${stock.sectorName || '待更新'} | ${stock.listDate} 挂牌</p>
                            </div>
                            <span class="${ui.bg} ${ui.text} ${ui.border} border px-2.5 py-1 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                <span>${ui.icon}</span>${rating}
                            </span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-5">
                            <div class="bg-slate-950/50 border border-slate-800/80 rounded-xl p-3">
                                <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider block mb-1">招股价</span>
                                <span class="text-base font-mono font-bold text-slate-200">$${stock.offerPrice || '?'} <span class="text-xs text-slate-500 font-normal">港元</span></span>
                            </div>
                            <div class="bg-slate-950/50 border border-slate-800/80 rounded-xl p-3">
                                <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider block mb-1">流通盘</span>
                                <span class="text-base font-mono font-bold text-slate-200">${stock.floatCap ? stock.floatCap.toFixed(1) : '?'} <span class="text-xs text-slate-500 font-normal">亿港元</span></span>
                            </div>
                            <div class="bg-slate-950/50 border border-slate-800/80 rounded-xl p-3">
                                <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider block mb-1">发售股份</span>
                                <span class="text-base font-mono font-bold text-slate-200">${stock.sharesOffered ? (stock.sharesOffered/10000).toFixed(0) : '?'} <span class="text-xs text-slate-500 font-normal">万股</span></span>
                            </div>
                            <div class="bg-indigo-500/5 border border-indigo-500/10 rounded-xl p-3">
                                <span class="text-[10px] text-indigo-400 uppercase font-bold tracking-wider block mb-1">量化得分</span>
                                <span class="text-lg font-mono font-black text-indigo-400">${score} <span class="text-[10px] text-indigo-500 font-normal">/ 100</span></span>
                            </div>
                            ${ahBadge}
                        </div>
                    </div>
                    <div class="mt-auto pt-4 border-t border-slate-800/80">
                        <div class="flex items-center gap-1.5 mb-2">
                            <i class="fa-solid fa-scale-balanced text-indigo-400 text-xs"></i>
                            <span class="text-xs font-bold text-slate-300">决策依据：</span>
                        </div>
                        <ul class="text-xs text-slate-400 space-y-1.5 leading-relaxed">
                            ${(stock.reasons || ['暂无详细数据']).map(r => `<li class="flex items-start gap-1.5"><span class="text-indigo-500">•</span> <span>${r}</span></li>`).join('')}
                        </ul>
                    </div>
                </div>`;
            }).join('');
        }

        function renderHistoryTable(listed) {
            const div = document.getElementById('historyIpoTable');
            if (listed.length === 0) {
                div.innerHTML = `<div class="p-8 text-center text-slate-600">暂无历史参考数据</div>`;
                return;
            }
            div.innerHTML = `
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-950/50 text-xs font-bold uppercase tracking-wider text-slate-400">
                                <th class="p-4">代码/名称</th>
                                <th class="p-4">行业</th>
                                <th class="p-4 text-center">上市日期</th>
                                <th class="p-4 text-center">招股价</th>
                                <th class="p-4 text-center">当前价</th>
                                <th class="p-4 text-center bg-indigo-500/5 text-indigo-400">累计表现</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800 text-xs text-slate-300 font-medium">
                            ${listed.map(stock => {
                                const debut = stock.debut || 'N/A';
                                const isUp = debut.startsWith('+');
                                const color = isUp ? 'text-rose-400' : (debut === 'N/A' ? '' : 'text-emerald-400');
                                const bg = isUp ? 'bg-rose-500/5' : (debut === 'N/A' ? '' : 'bg-emerald-500/5');
                                return `<tr class="hover:bg-slate-800/30 transition-colors">
                                    <td class="p-4">
                                        <div class="font-bold text-white">${stock.name}</div>
                                        <div class="text-[10px] font-mono text-slate-500 mt-0.5">${stock.code}.HK</div>
                                    </td>
                                    <td class="p-4 text-slate-400">${stock.sectorName || '-'}</td>
                                    <td class="p-4 text-center font-mono">${stock.listDate || '-'}</td>
                                    <td class="p-4 text-center font-mono">${stock.offerPrice ? '$' + stock.offerPrice : '-'}</td>
                                    <td class="p-4 text-center font-mono">${stock.currentPrice ? '$' + stock.currentPrice : '-'}</td>
                                    <td class="p-4 text-center font-mono font-bold ${bg} ${color}">${debut}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // ----- 同步 -----

        function toggleSyncModal() {
            document.getElementById('syncModal').classList.toggle('hidden');
        }

        function importJsonData() {
            const raw = document.getElementById('jsonInput').value.trim();
            if (!raw) return alert('请输入 JSON 数据');
            try {
                const parsed = JSON.parse(raw);
                const arr = Array.isArray(parsed) ? parsed : [parsed];
                ipoData = arr;
                renderAll();
                const now = new Date();
                document.getElementById('syncTime').innerText =
                    now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' +
                    String(now.getDate()).padStart(2,'0') + ' ' +
                    String(now.getHours()).padStart(2,'0') + ':' +
                    String(now.getMinutes()).padStart(2,'0') + ':' +
                    String(now.getSeconds()).padStart(2,'0');
                toggleSyncModal();
            } catch(e) {
                alert('解析失败: ' + e.message);
            }
        }

        // ----- 自动加载 -----

        async function autoLoadJson() {
            try {
                const resp = await fetch('ipo_daily_report.json?_=' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                if (Array.isArray(data) && data.length > 0) {
                    ipoData = data;
                    renderAll();
                }
            } catch (e) {
                // file:// 协议下无法 fetch，提示用户同步
                console.log('自动加载失败，请手动同步 JSON');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            autoLoadJson();
            renderAll();
        });
    </script>
</body>
</html>
